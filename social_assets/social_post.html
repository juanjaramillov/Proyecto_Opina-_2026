<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  
  body, html {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1350px;
    background-color: #F8FAFC;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    color: #0F172A;
  }
  
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  /* TEXT AREA: top 350px */
  .header {
    padding: 70px 100px 0 100px;
    height: 350px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    z-index: 5;
  }

  h1 {
    font-size: 72px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin: 0 0 24px 0;
  }

  .text-info { 
    background: linear-gradient(90deg, #2563EB, #3B82F6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: #2563EB; 
  }
  .text-signal { 
    background: linear-gradient(90deg, #10B981, #34D399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: #10B981;
  }

  .subtitle {
    font-size: 36px;
    font-weight: 400;
    color: #334155;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 1.3;
    max-width: 900px;
  }

  /* ILLUSTRATION AREA: The dominant centerpiece, 850px height */
  .illustration-container {
    position: relative;
    width: 1080px;
    height: 850px;
    z-index: 1;
    /* Optional: very subtle top/bottom borders or shadows to frame it as a component */
    border-top: 1px solid rgba(15, 23, 42, 0.05);
    border-bottom: 1px solid rgba(15, 23, 42, 0.05);
    background-color: #F8FAFC;
    overflow: hidden;
  }

  /* FOOTER AREA: bottom 150px */
  .footer {
    height: 150px;
    padding: 0 100px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
  }

  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .closing {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #0F172A;
  }

  /* Strict Logo Requirements */
  .logo-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    /* Use exact brand colors */
    background: linear-gradient(135deg, #2563EB, #10B981);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: none; /* "No glow" requirement */
  }

  .logo-icon svg {
    width: 20px;
    height: 20px;
  }

  .logo-text {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    display: flex;
    align-items: baseline;
    color: #0F172A;
  }
  
  .logo-plus {
    color: #000000; /* Solid black as requested */
    font-weight: 700;
  }

  .footer-right {
    font-size: 26px;
    font-weight: 500;
    color: #475569;
    letter-spacing: 0.02em;
  }

  /* Overlays for depth */
  .grid-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 2;
    pointer-events: none;
  }

</style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h1>NO TODA LA <span class="text-info">INFORMACIÓN</span><br>ES <span class="text-signal">SEÑAL</span>.</h1>
      <p class="subtitle">El exceso de datos no siempre mejora las decisiones.</p>
    </div>

    <div class="illustration-container" id="canvasContainer">
      <div class="grid-overlay"></div>
      <canvas id="visualCanvas"></canvas>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="closing">Tu opinión es una señal.</div>
        <div class="logo-group">
          <div class="logo-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 10V30" stroke="white" stroke-width="4" stroke-linecap="round" />
              <path d="M14 15V25" stroke="white" stroke-width="4" stroke-linecap="round" />
              <path d="M26 15V25" stroke="white" stroke-width="4" stroke-linecap="round" />
            </svg>
          </div>
          <div class="logo-text">Opina<span class="logo-plus">+</span></div>
        </div>
      </div>
      <div class="footer-right">www.opinamas.app</div>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('visualCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    const width = 1080;
    const height = 850;
    
    // Scale for ultra-high-res output
    const scale = 3; 
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    canvas.width = width * scale;
    canvas.height = height * scale;
    ctx.scale(scale, scale);

    // Clear and background
    ctx.fillStyle = '#F8FAFC';
    ctx.fillRect(0, 0, width, height);

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = 'multiply';

    let seed = 9999;
    function rand() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }

    // Core coordinates
    const coreX = 800;
    const coreY = 425;

    // We draw 35,000 paths to make it MASSIVE and incredibly dense
    const numPaths = 35000;

    for (let i = 0; i < numPaths; i++) {
        // Start scattered heavily on the left and top
        let x = rand() * 500 - 100;
        let y = rand() * 1000 - 75;

        // Target assigned perfectly to a quantized ring in the core
        // Rings between radius 40 and 420
        const ringSpacing = 15;
        const targetRadius = Math.floor(rand() * 26) * ringSpacing + 30;
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        
        // Keep track of previous coordinates to stroke a smooth curve
        for (let step = 0; step < 70; step++) {
            
            // Distance and angle to core
            const dx = coreX - x;
            // Introduce a focal pinch in Y to funnel them gracefully
            const dy = coreY - y; 
            const r = Math.sqrt(dx*dx + dy*dy) + 0.1;
            const theta = Math.atan2(y - coreY, x - coreX);

            // "Chaos factor" based on X position.
            // 1 from X=0 to X=350. Transitions to 0 at X=700.
            let chaos = Math.max(0, Math.min(1, 1 - (x - 300) / 400));
            // Power curve so chaos lingers longer then snaps fast
            chaos = Math.pow(chaos, 0.7);

            // Chaos Velocity (Swirling turbulence)
            // Complex superposition
            const cVx = Math.sin(y * 0.015) * 20 + Math.cos(x * 0.02) * 10 + 5; // Drift right
            const cVy = Math.cos(x * 0.01) * 20 + Math.sin(y * 0.02) * 10;
            
            // Signal Orbit Velocity
            // Needs to move inward to its target radius, and tangent to orbit
            const speed = 20;
            
            // Tangential component (CW or CCW varying per ring or random)
            const orbitDir = (targetRadius % 30 === 0) ? -1 : 1; 
            const orbitVx = -Math.sin(theta) * speed * orbitDir;
            const orbitVy =  Math.cos(theta) * speed * orbitDir;
            
            // Radial component (pulls inwards or outwards to exact targetRadius)
            const radialPull = (r - targetRadius) * 0.1;
            const radialVx = Math.cos(theta) * radialPull;
            const radialVy = Math.sin(theta) * radialPull;
            
            // Combine signal velocity
            const sVx = orbitVx + radialVx;
            const sVy = orbitVy + radialVy;
            
            // Final step velocity
            let vx = cVx * chaos + sVx * (1 - chaos);
            let vy = cVy * chaos + sVy * (1 - chaos);

            // To make sure they make steady progress globally to the right:
            vx += 6 * chaos; 

            x += vx;
            y += vy;
            
            ctx.lineTo(x, y);

            // Stop calculating if it has effectively stabilized in pure signal to save time
            if (chaos < 0.01 && Math.abs(r - targetRadius) < 1) {
                // draw a sharp dash and break
                ctx.lineTo(x + orbitVx*0.5, y + orbitVy*0.5);
                break;
            }
        }

        // Determine color based on final position or average chaos
        const finalDist = Math.max(0, Math.min(1, 1 - (x - 300) / 400));
        const cColor = Math.pow(finalDist, 0.5); // Favor emerald as it gets close
        
        // Mapped from Blue(#2563EB) to Emerald(#10B981)
        // From RGB (37, 99, 235) to RGB (16, 185, 129)
        const cr = Math.round(16 * (1 - cColor) + 37 * cColor);
        const cg = Math.round(185 * (1 - cColor) + 99 * cColor);
        const cb = Math.round(129 * (1 - cColor) + 235 * cColor);
        
        ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${0.12})`;
        ctx.lineWidth = 1.0;
        ctx.stroke();
    }

    // Overlay to increase "Product/Tech Intelligence" feel
    // Draw some sharp precise HUD alignment circles at the core
    ctx.globalCompositeOperation = 'source-over';
    for(let radius = 30; radius <= 420; radius += 60) {
        ctx.beginPath();
        ctx.arc(coreX, coreY, radius, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(16, 185, 129, 0.4)`;
        ctx.lineWidth = 1;
        // make it a strictly dashed line
        ctx.setLineDash([4, 12]);
        ctx.stroke();
    }
    
    // Reset dash
    ctx.setLineDash([]);
    // Draw crosshairs at core
    ctx.beginPath();
    ctx.moveTo(coreX - 450, coreY);
    ctx.lineTo(coreX + 450, coreY);
    ctx.moveTo(coreX, coreY - 450);
    ctx.lineTo(coreX, coreY + 450);
    ctx.strokeStyle = `rgba(16, 185, 129, 0.2)`;
    ctx.lineWidth = 1;
    ctx.stroke();

  </script>
</body>
</html>
