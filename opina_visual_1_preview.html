<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Opina+ Visual 1 Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #1e293b; /* fondo exterior del browser oscuro para hacer contraste */
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem; 
        }
        
        .poster { 
            background-color: #F8FAFC; 
            width: 800px; 
            height: 1000px; /* Ratio 4:5 exacto */
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }

        /* La señal fluida escondida */
        .gradient-wave {
            position: absolute;
            width: 600px; 
            height: 600px;
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 40%, #10B981 80%, #34D399 100%);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 8s ease-in-out infinite;
            top: 25%; left: 15%;
            z-index: 1;
            filter: blur(20px);
        }

        @keyframes morph {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg) scale(1); }
            50% { border-radius: 60% 40% 30% 70% / 60% 50% 40% 50%; transform: rotate(45deg) scale(1.1); }
        }

        /* La estructura rígida (métrica estática) rompiéndose */
        .frosted-glass {
            position: absolute;
            width: 400px; 
            height: 700px;
            top: 15%; left: 50%;
            transform: translateX(-50%);
            background: rgba(248, 250, 252, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-bottom: none;
            border-radius: 12px;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Para simular la desintegración del cristal / revelar la señal */
        .frosted-glass::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 250px;
            background: linear-gradient(to bottom, rgba(248, 250, 252, 0.4), transparent);
            backdrop-filter: blur(5px);
        }
        
    </style>
</head>
<body>
    <div class="poster">
        <!-- Ilustración 3D Simulada -->
        <div class="gradient-wave"></div>
        <div class="frosted-glass"></div>
        
        <!-- Capa de Contenido / Textos (Z-index 10) -->
        <div class="absolute inset-0 z-10 flex flex-col p-16">
            
            <!-- Logo Superior Izquierda. Usa la ruta local de tu disco duro exacto -->
            <div class="w-48 mix-blend-multiply">
                <img src="file:///Users/juanignaciojaramillo/Desktop/Opina+/Grafica /Logo ALTA .jpg" class="w-full h-auto" alt="Opina+ Logo" />
            </div>

            <!-- Texto Principal -->
            <div class="mt-auto mb-32 relative">
                <!-- Sombra blanca sutil para legibilidad perfecta sobre la ilustración -->
                <h1 class="text-6xl font-extrabold text-[#0F172A] leading-[1.1] tracking-tight max-w-2xl relative z-20" style="text-shadow: 0px 4px 40px rgba(248,250,252,1), 0px 0px 20px rgba(248,250,252,0.9);">
                    Una preferencia alta <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#2563EB] to-[#10B981]">no siempre</span> 
                    es defendible.
                </h1>
            </div>

            <!-- Website -->
            <div class="absolute bottom-12 left-0 right-0 flex justify-center">
                <p class="text-[#0F172A] font-semibold text-lg tracking-widest uppercase opacity-70">
                    www.opinamas.app
                </p>
            </div>
        </div>
    </div>
</body>
</html>
