# NOTA (2026-04-25, fix F-04 — CTO audit):
# La función legacy `wa-webhook` se eliminó. El webhook oficial de
# WhatsApp es ahora `whatsapp-webhook`, que verifica HMAC
# X-Hub-Signature-256, valida el token de Meta y persiste en
# `whatsapp_inbound_messages`. La WABA "Opina Mas" (918306757653627)
# está suscrita a la app "Opina Web" (1601252761020060) apuntando a
# esa URL.
