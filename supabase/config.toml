[functions.whatsapp-webhook]
verify_jwt = false

[functions.register-user]
enabled = true
verify_jwt = false
entrypoint = "./functions/register-user/index.ts"

[functions.cleanup-orphan-users]
enabled = true
verify_jwt = true
