<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Opina+ Social Post Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 50px;
      background-color: #E2E8F0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    
    .post-container {
      width: 1080px;
      height: 1350px;
      background-color: #F8FAFC;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .image-layer {
      position: absolute;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .image-cover {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center bottom;
      mix-blend-mode: darken;
    }

    .gradient-overlay-x {
      position: absolute;
      top: 0;
      left: 0;
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, rgba(248,250,252,1) 40%, rgba(248,250,252,0) 100%);
      z-index: 2;
    }

    .gradient-overlay-y {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(248,250,252,1) 15%, rgba(248,250,252,0) 100%);
      z-index: 2;
    }

    .content-layer {
      position: relative;
      z-index: 10;
      height: calc(100% - 200px); /* accounting for padding */
      padding: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 70%;
      box-sizing: border-box;
    }

    .headline {
      font-size: 78px;
      font-weight: 800;
      color: #0F172A;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin: 0 0 40px 0;
      text-transform: uppercase;
      max-width: 800px;
    }

    .headline .highlight-gradient {
      background: linear-gradient(90deg, #2563EB 0%, #10B981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .subheadline {
      font-size: 34px;
      font-weight: 500;
      color: #334155;
      line-height: 1.4;
      margin: 0;
      max-width: 760px;
      letter-spacing: -0.01em;
    }

    .footer {
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    .tagline {
      font-size: 26px;
      font-weight: 600;
      color: #10B981;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tagline::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background-color: #10B981;
    }

    .logo {
      height: 44px;
      width: auto;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <div class="post-container">
    <div class="image-layer">
      <!-- Using absolute file URLs so it renders quickly locally in browser -->
      <img class="image-cover" src="file:///Users/juanignaciojaramillo/.gemini/antigravity/brain/9dbdab4d-a3fc-4848-b622-cd05c495c603/refined_fragility_concept_1776272575128.png" alt="Concept Illustration" />
      <div class="gradient-overlay-x"></div>
      <div class="gradient-overlay-y"></div>
    </div>

    <div class="content-layer">
      <div>
        <h1 class="headline">
          Una preferencia<br>alta <span class="highlight-gradient">no siempre</span><br>es defendible.
        </h1>
        <p class="subheadline">
          Las métricas estáticas pueden mostrar liderazgo, pero no siempre alertan su fragilidad.
        </p>
      </div>

      <div class="footer">
        <div class="tagline">
          Tu opinión es una señal.
        </div>
        <img class="logo" src="file:///Users/juanignaciojaramillo/Desktop/Opina+/Antigravity - Proyecto/Opina+ V15/figma_assets/logos/opina_logo.svg" alt="Opina+ Logo" />
      </div>
    </div>
  </div>

</body>
</html>
