<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opina+ Social Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --dark: #0F172A;
            --blue: #2563EB;
            --emerald: #10B981;
            --support-blue: #3B82F6;
            --support-emerald: #34D399;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1350px;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Top Header */
        .header {
            position: absolute;
            top: 70px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            height: 48px;
            /* Placeholder styles in case SVG fails, but we'll use an img tag */
            display: block;
        }

        .website {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 24px;
            color: var(--dark);
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        /* Main Content */
        .content {
            position: absolute;
            top: 220px;
            left: 80px;
            right: 80px;
            z-index: 10;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 76px;
            line-height: 1.05;
            letter-spacing: -1.5px;
            color: var(--dark);
            margin: 0;
            max-width: 900px;
            text-transform: uppercase;
        }

        .supporting-text {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 30px;
            line-height: 1.4;
            color: #475569;
            margin-top: 32px;
            max-width: 800px;
            letter-spacing: -0.2px;
        }

        /* Closing Line */
        .closing-container {
            position: absolute;
            bottom: 80px;
            left: 80px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 16px 32px;
            border-radius: 100px;
            border: 1px solid rgba(15, 23, 42, 0.05);
            box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.15);
        }

        .closing-line {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(90deg, var(--blue), var(--emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .signal-icon {
            width: 24px;
            height: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Illustration Canvas */
        .illustration-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1080px;
            height: 1000px;
            z-index: 1;
            /* Mix blend mode for premium aesthetic */
            mix-blend-mode: multiply;
        }

        svg#generative-art {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Premium ambient glows */
        .ambient-glow-1 {
            position: absolute;
            top: 40%;
            right: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(248, 250, 252, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, rgba(248, 250, 252, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="figma_assets/logos/opina_logo.svg" style="width: 56px; height: 56px; flex-shrink: 0; display: block;" alt="Opina+ Circle">
            <span style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 56px; color: #0F172A; letter-spacing: -1.5px; margin-top: 4px;">Opina+</span>
        </div>
        <div class="website">www.opinamas.app</div>
    </div>

    <div class="content">
        <h1 class="headline">Una preferencia alta<br>no siempre es defendible.</h1>
        <p class="supporting-text">Las métricas estáticas pueden mostrar liderazgo, pero no siempre alertan su fragilidad.</p>
    </div>

    <div class="illustration-container">
        <svg id="generative-art" viewBox="0 0 1080 1000">
            <defs>
                <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2563EB" />
                    <stop offset="40%" stop-color="#3B82F6" />
                    <stop offset="70%" stop-color="#10B981" />
                    <stop offset="100%" stop-color="#34D399" />
                </linearGradient>
                
                <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#2563EB" stop-opacity="0.05" />
                    <stop offset="100%" stop-color="#10B981" stop-opacity="0.05" />
                </linearGradient>

                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <g id="paths-group"></g>
        </svg>
    </div>

    <div class="closing-container">
        <svg class="signal-icon" viewBox="0 0 24 24" fill="none" stroke="url(#flowGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
        </svg>
        <p class="closing-line">Tu opinión es una señal.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const svgGroup = document.getElementById('paths-group');
            
            const numLines = 150;
            const width = 1080;
            const height = 1000;
            const numPoints = 80; // horizontal points
            
            // We want the lines to start from a solid "metric" pillar on the left,
            // and dissolve / spread into wild signals on the right.
            
            // X spans from -100 to width + 100
            
            for (let i = 0; i < numLines; i++) {
                let pathPoints = [];
                // The vertical distribution is tight in the center, wider at ends
                // We'll create a central band that shatters.
                const baseY = height / 2.2;
                // Distribute i evenly
                const progress = i / (numLines - 1);
                // The offset from centerline, max 300px up or down
                const initialOffset = (progress - 0.5) * 600; 
                
                const randomPhase1 = Math.random() * Math.PI * 2;
                const randomPhase2 = Math.random() * Math.PI * 2;
                const randomSpeed1 = 0.01 + Math.random() * 0.03;
                const randomSpeed2 = 0.05 + Math.random() * 0.08;
                
                // Add some variation to when they "break" out of the solid block
                const breakPoint = 0.3 + Math.random() * 0.2; // 30% to 50% across the width

                for (let j = 0; j <= numPoints; j++) {
                    const xProgress = j / numPoints;
                    const xPos = -50 + xProgress * (width + 100);
                    
                    let yPos = baseY;

                    if (xProgress < breakPoint) {
                        // "Apparent strength" -> Form a perfectly straight, solid, dense block
                        // The lines are packed together. Let's make them form a thick pillar.
                        yPos += initialOffset * 0.2; 
                    } else {
                        // "Hidden fragility" -> Disperse into wild wave signals
                        const overBreak = (xProgress - breakPoint) / (1 - breakPoint); 
                        // easing to make the split smooth
                        const splitEase = overBreak * overBreak * (3 - 2 * overBreak); // Smoothstep
                        
                        // the base line spreads out 
                        let wave1 = Math.sin(xPos * randomSpeed1 + randomPhase1) * 80;
                        let wave2 = Math.sin(xPos * randomSpeed2 + randomPhase2) * 40;
                        
                        // Lines explode out based on their initial offset
                        const spreadFactor = 2.5; 
                        
                        yPos += initialOffset * 0.2 * (1 - splitEase) + 
                                (initialOffset * spreadFactor + wave1 + wave2) * splitEase;
                    }
                    
                    pathPoints.push(`${xPos},${yPos}`);
                }

                // Create SVG Path element
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                
                // Construct the bezier/lines path string
                // Using bezier curves to make it smooth
                let d = `M ${pathPoints[0]}`;
                for(let p=1; p<pathPoints.length - 2; p++) {
                    const p1 = pathPoints[p].split(',');
                    const p2 = pathPoints[p+1].split(',');
                    const xc = (parseFloat(p1[0]) + parseFloat(p2[0])) / 2;
                    const yc = (parseFloat(p1[1]) + parseFloat(p2[1])) / 2;
                    d += ` Q ${p1[0]},${p1[1]} ${xc},${yc}`;
                }
                const last = pathPoints[pathPoints.length-1].split(',');
                d += ` T ${last[0]},${last[1]}`;

                path.setAttribute("d", d);
                
                // Opacity varies so some lines are thick signals, some are faint
                const baseOpacity = 0.15 + Math.random() * 0.3;
                
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", "url(#flowGradient)");
                path.setAttribute("stroke-width", Math.random() > 0.9 ? 3 : 1);
                path.setAttribute("opacity", baseOpacity);
                path.setAttribute("stroke-linejoin", "round");
                path.setAttribute("stroke-linecap", "round");

                svgGroup.appendChild(path);
            }
        });
    </script>
</body>
</html>
